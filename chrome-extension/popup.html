<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FormSarthi</title>
  <script src="crypto-js.min.js"></script>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<!-- ═══════════════════════════════════════════
     SCREEN 1: PROFILE LIST
     ═══════════════════════════════════════════ -->
<div id="screen-profiles" class="screen active">
  <div class="popup-header">
    <div class="header-brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M9 12h6M9 16h6M9 8h6M5 20h14a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
      </div>
      <div>
        <div class="brand-name">FormSarthi</div>
        <div class="brand-sub">Smart Form Filler 🇮🇳</div>
      </div>
    </div>
    <button class="icon-btn" id="btn-theme" title="Toggle Theme">
      <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
      <svg id="icon-sun"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>

  <!-- Loading Skeleton -->
  <div id="profiles-loading" class="loading-state">
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
  </div>

  <!-- Empty State -->
  <div id="profiles-empty" class="empty-state" style="display:none">
    <div class="empty-icon">🔒</div>
    <h3>No Profiles Found</h3>
    <p>Open the FormSarthi portal, create a profile, then come back here.</p>
    <button class="btn-primary" id="btn-open-portal">Open Portal ↗</button>
  </div>

  <!-- Profiles List -->
  <div id="profiles-list" style="display:none">
    <div class="section-label">SELECT PROFILE TO UNLOCK</div>
    <div id="profiles-container" class="profiles-container"></div>
    <button class="btn-ghost full-width" id="btn-open-portal-2" style="margin:8px 10px 12px; width:calc(100% - 20px)">
      + Open FormSarthi Portal
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     SCREEN 2: UNLOCK (password only — no numpad)
     ═══════════════════════════════════════════ -->
<div id="screen-unlock" class="screen">
  <div class="popup-header slim">
    <button class="back-btn" id="btn-back-from-unlock">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="header-title">Unlock Vault</span>
    <div style="width:32px"></div>
  </div>

  <div class="unlock-body">
    <div class="unlock-avatar" id="unlock-avatar">🪪</div>
    <div class="unlock-name"  id="unlock-name">Profile Name</div>
    <div class="unlock-email" id="unlock-email">email@example.com</div>

    <!-- Password field — full width, prominent -->
    <div class="unlock-pass-wrap">
      <div class="pass-field-group">
        <svg class="pass-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input type="password"
               id="password-input"
               class="pass-input-main"
               placeholder="Enter your password…"
               autocomplete="current-password"
               autofocus>
        <button class="pass-show-btn" id="btn-toggle-pass" type="button" title="Show/hide password">
          <svg id="eye-open"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
      <button class="btn-primary btn-unlock-main" id="btn-unlock-pass">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:16px;height:16px;flex-shrink:0"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        Unlock
      </button>
    </div>

    <div class="pin-error" id="pin-error"></div>
    <div class="unlock-hint">🔒 Password never leaves your device</div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     SCREEN 3: PROFILE REVIEW + AUTOFILL
     ═══════════════════════════════════════════ -->
<div id="screen-review" class="screen">
  <div class="popup-header slim">
    <button class="back-btn" id="btn-back-from-review">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="header-title">Vault Unlocked</span>
    <button class="icon-btn" id="btn-lock" title="Lock Vault">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </button>
  </div>

  <div class="review-body">
    <!-- Profile Summary -->
    <div class="profile-summary-row">
      <div class="review-avatar" id="review-avatar">🪪</div>
      <div class="review-info">
        <div class="review-name"  id="review-name">Name</div>
        <div class="review-email" id="review-email">email</div>
      </div>
      <div class="completion-ring-wrap">
        <svg class="ring-svg" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="16" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3"/>
          <circle id="ring-progress" cx="20" cy="20" r="16" fill="none" stroke="var(--accent)" stroke-width="3"
            stroke-dasharray="100.5" stroke-dashoffset="100.5" stroke-linecap="round"
            transform="rotate(-90 20 20)" style="transition:stroke-dashoffset 0.6s ease"/>
        </svg>
        <span id="ring-pct" class="ring-pct">0%</span>
      </div>
    </div>

    <!-- Readiness bar -->
    <div class="readiness-bar">
      <div class="readiness-label">
        <span>Autofill Readiness</span>
        <span id="readiness-pct-text">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="readiness-fill"></div>
      </div>
    </div>

    <!-- Field groups -->
    <div class="field-groups" id="field-groups"></div>

    <!-- Missing fields -->
    <div id="missing-section" style="display:none">
      <div class="section-label missing-label">MISSING FIELDS</div>
      <div id="missing-chips" class="missing-chips"></div>
    </div>
  </div>

  <!-- Sticky autofill bar -->
  <div class="sticky-bar">
    <div id="fill-msg" class="fill-msg" style="display:none"></div>
    <button class="btn-primary full-width" id="btn-autofill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:16px;height:16px;flex-shrink:0"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      Autofill This Page
    </button>
    <button class="btn-ghost full-width" id="btn-refresh">🔄 Refresh Profiles</button>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
